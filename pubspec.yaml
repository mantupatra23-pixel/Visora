name: visora
description: AI Video App - Visora (Flutter Frontend)
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^0.13.6
  image_picker: ^0.8.7+4
  file_picker: ^5.2.5
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true

dependency_overrides:
  file_picker_windows: ^0.0.1
  file_picker_linux: ^0.0.1
  file_picker_macos: ^0.0.1
