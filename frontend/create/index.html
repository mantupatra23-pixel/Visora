<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Video • Visora</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h1 class="brand">Visora</h1>
      <nav>
        <a href="/dashboard">Dashboard</a>
        <a class="active" href="/create">Create Video</a>
        <a href="/assistant">Assistant</a>
        <a href="/profile">Profile</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <header class="header">
        <h2>🎬 Create Video</h2>
        <p>Write your script, choose style, and generate creative videos instantly!</p>
      </header>

      <!-- Big Script Box -->
      <section class="script-section">
        <label for="script" class="main-label">✍️ Write Your Script</label>
        <textarea id="script" rows="12" placeholder="Start writing your video script here..."></textarea>

        <div class="action-row">
          <button id="genScriptBtn" class="btn secondary">💡 Generate Script (AI)</button>
          <button id="clearBtn" class="btn danger">🧹 Clear</button>
        </div>
      </section>

      <!-- Options Section -->
      <section class="options">
        <div class="option-group">
          <label>🎤 Voice</label>
          <select id="voice">
            <option value="female-1">Female Voice 1</option>
            <option value="male-1">Male Voice 1</option>
            <option value="neutral">Neutral</option>
          </select>
        </div>

        <div class="option-group">
          <label>🎨 Template</label>
          <select id="template">
            <option value="clean">Clean Promo</option>
            <option value="cinematic">Cinematic</option>
            <option value="social">Social Shorts</option>
          </select>
        </div>

        <div class="option-group">
          <label>🎵 Music</label>
          <select id="music">
            <option value="none">None</option>
            <option value="uplifting">Uplifting</option>
            <option value="calm">Calm</option>
          </select>
        </div>

        <div class="option-group">
          <label>🎬 Video Title</label>
          <input id="title" placeholder="Enter your video title..." />
        </div>

        <div class="action-row">
          <button id="createBtn" class="btn primary">🚀 Create Video</button>
        </div>
      </section>

      <!-- Status & Preview -->
      <section class="status-box">
        <div id="status">🟡 Waiting for input...</div>
        <div class="preview">
          <h3>Preview</h3>
          <div id="previewBox" class="preview-box">Your video preview will appear here</div>
          <audio id="previewAudio" controls style="display:none;"></audio>
        </div>
      </section>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
