<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visora — Create Video</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🎬 Visora AI — Create Video</h1>

    <textarea id="script" placeholder="Enter your topic or script..."></textarea>

    <div class="options">
      <label>🎤 Voice</label>
      <select id="voice">
        <option>Female Voice 1</option>
        <option>Male Voice 1</option>
      </select>

      <label>🎨 Template</label>
      <select id="template">
        <option>Modern</option>
        <option>Classic</option>
        <option>Minimal</option>
      </select>

      <label>🎵 Background Music</label>
      <select id="music">
        <option>Soft</option>
        <option>Inspiring</option>
        <option>Energetic</option>
      </select>
    </div>

    <div class="buttons">
      <button id="generate">✨ Generate Script (AI)</button>
      <button id="create">🚀 Create Video</button>
    </div>

    <p id="status">Status: idle</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
