<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Video - Visora</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h1>Visora</h1>
      <nav>
        <a href="/">Dashboard</a>
        <a class="active" href="/create-video">Create Video</a>
        <a href="/assistant">Assistant</a>
        <a href="/profile">Profile</a>
      </nav>
    </aside>

    <main class="main">
      <h2>🎬 Create Video</h2>

      <div class="card">
        <label>Video Title</label>
        <input id="title" placeholder="Enter video title" />

        <label>Script / Prompt</label>
        <textarea id="prompt" placeholder="Describe what video to make..." rows="6"></textarea>

        <label>Voice</label>
        <select id="voice">
          <option value="female_1">Female Voice 1</option>
          <option value="male_1">Male Voice 1</option>
        </select>

        <button id="createBtn">🚀 Create Video</button>
      </div>

      <div class="card" id="statusCard" style="display:none;">
        <h3>Status</h3>
        <pre id="statusText">Waiting...</pre>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
