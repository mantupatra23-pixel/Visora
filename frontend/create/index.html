<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Video - Visora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎬 Create Your Video</h1>
    <p class="subtitle">Write your video script, choose options, and generate your video automatically.</p>

    <!-- Script Box -->
    <label for="scriptBox" class="label">📝 Write Your Script</label>
    <textarea id="scriptBox" placeholder="Start writing your video script here..."></textarea>

    <!-- Options Section -->
    <div class="options">
      <div>
        <label>🎤 Voice</label>
        <select id="voiceSelect">
          <option>Female Voice 1</option>
          <option>Male Voice 1</option>
          <option>Female Voice 2</option>
        </select>
      </div>

      <div>
        <label>🎨 Template</label>
        <select id="templateSelect">
          <option>Modern</option>
          <option>Motivational</option>
          <option>Funny</option>
        </select>
      </div>

      <div>
        <label>🎵 Background Music</label>
        <select id="musicSelect">
          <option>Soft</option>
          <option>Energetic</option>
          <option>Emotional</option>
        </select>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="buttons">
      <button id="generateScriptBtn">✨ Generate Script (AI)</button>
      <button id="createVideoBtn">🚀 Create Video</button>
    </div>

    <!-- Status Box -->
    <div id="statusBox">
      <p>Status: <span id="statusText">Waiting for input...</span></p>
    </div>

    <!-- Video Preview -->
    <div id="videoBox" class="hidden">
      <h3>🎥 Generated Video</h3>
      <video id="previewVideo" controls></video>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
