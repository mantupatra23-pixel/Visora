<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Video • Visora</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="brand">Visora</h1>
      <nav>
        <a href="/dashboard">Dashboard</a>
        <a class="active" href="/create">Create Video</a>
        <a href="/assistant">Assistant</a>
        <a href="/profile">Profile</a>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h2>Create Video</h2>
        <div class="small">Make short, creative videos automatically</div>
      </header>

      <section class="panel">
        <label>Video Title</label>
        <input id="title" placeholder="Enter a title (e.g. Never Give Up)" />

        <label>Script / Prompt</label>
        <textarea id="script" rows="6" placeholder="Write your script here or use AI to generate it..."></textarea>

        <div class="row">
          <div>
            <label>Voice</label>
            <select id="voice">
              <option value="female-1">Female Voice 1</option>
              <option value="male-1">Male Voice 1</option>
              <option value="neutral">Neutral</option>
            </select>
          </div>

          <div>
            <label>Template</label>
            <select id="template">
              <option value="clean">Clean Promo</option>
              <option value="cinematic">Cinematic</option>
              <option value="social">Social Shorts</option>
            </select>
          </div>

          <div>
            <label>Music</label>
            <select id="music">
              <option value="none">None</option>
              <option value="uplifting">Uplifting</option>
              <option value="calm">Calm</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="genScriptBtn" class="btn secondary">🎯 Generate Script (AI)</button>
          <button id="createBtn" class="btn primary">🚀 Create Video</button>
        </div>

        <div id="status" class="status"></div>

        <hr/>

        <div class="preview">
          <h3>Preview</h3>
          <div id="previewBox" class="preview-box">No preview yet.</div>
          <audio id="previewAudio" controls style="display:none;"></audio>
        </div>
      </section>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
