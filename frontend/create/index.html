<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Visora - Create Video</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Visora — Create Video</h1>

    <label>Script / Prompt</label>
    <textarea id="script" rows="6" placeholder="Write or generate script..."></textarea>

    <div class="row">
      <div class="col">
        <label>Voice</label>
        <select id="voice">
          <option>Female Voice 1</option>
          <option>Male Voice 1</option>
        </select>
      </div>
      <div class="col">
        <label>Template</label>
        <select id="template">
          <option>Modern</option>
          <option>Promo</option>
        </select>
      </div>
      <div class="col">
        <label>Background Music</label>
        <select id="bg">
          <option>Soft</option>
          <option>Energetic</option>
        </select>
      </div>
    </div>

    <div class="buttons">
      <button id="genScript" class="btn yellow">✨ Generate Script (AI)</button>
      <button id="createVideo" class="btn">🚀 Create Video</button>
    </div>

    <div id="status" class="status">Status: idle</div>

    <div id="result" class="result" style="display:none">
      <h3>Result</h3>
      <div id="resultContent"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
