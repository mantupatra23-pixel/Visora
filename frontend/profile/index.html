<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visora - Profile</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <aside class="sidebar">
    <h2>Visora</h2>
    <a href="../dashboard/index.html">Dashboard</a>
    <a href="../gallery/index.html">Gallery</a>
    <a href="index.html" class="active">Profile</a>
    <a href="../payments/index.html">Payments</a>
  </aside>

  <main class="content">
    <h1>My Profile</h1>
    <div class="profile-card">
      <img id="profilePhoto" src="../assets/default-user.png" alt="Profile Photo">
      <h2 id="profileName">—</h2>
      <p id="profileEmail">—</p>
      <p><strong>Plan:</strong> <span id="profilePlan">—</span></p>
      <p><strong>Credits:</strong> <span id="profileCredits">—</span></p>
      <p><strong>Country:</strong> <span id="profileCountry">—</span></p>

      <div class="row">
        <button id="editBtn" class="btn">Edit Profile</button>
        <button id="refreshBtn" class="btn primary">Refresh</button>
      </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Edit Profile</h3>
        <input id="editName" placeholder="Enter Name">
        <input id="editCountry" placeholder="Enter Country">
        <input type="file" id="editPhoto" accept="image/*">
        <button id="saveEdit" class="btn primary">Save</button>
      </div>
    </div>
  </main>
</body>
</html>
