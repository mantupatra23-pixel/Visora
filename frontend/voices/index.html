<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visora - Voices</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Visora</h2>
    <a href="../dashboard/index.html">📊 Dashboard</a>
    <a href="../create/index.html">🎬 Create Video</a>
    <a href="../templates/index.html">📂 Templates</a>
    <a href="../editor/index.html">✂️ Editor</a>
    <a href="./index.html" class="active">🎤 Voices</a>
    <a href="../assistant/index.html">🤖 Assistant</a>
    <a href="../profile/index.html">👤 Profile</a>
  </aside>

  <!-- Main -->
  <main class="content">
    <header>
      <h2>🎤 Voices</h2>
      <p class="muted">Preview 1000+ voices, adjust pitch & speed, or clone your own voice</p>
    </header>

    <!-- Voices Grid -->
    <section class="card">
      <h3>Available Voices</h3>
      <div id="voiceGrid" class="grid"></div>
    </section>

    <!-- Upload Voice -->
    <section class="card">
      <h3>Clone Your Voice</h3>
      <input id="clone_name" placeholder="Voice Name" />
      <input id="clone_file" type="file" accept="audio/*" />
      <button id="clone_btn" class="btn primary">Upload & Clone</button>
      <div id="clone_resp" class="mt small muted"></div>
    </section>
  </main>
</body>
</html>
