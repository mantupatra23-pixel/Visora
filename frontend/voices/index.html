<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visora - Voices</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <aside class="sidebar">
    <h2>Visora</h2>
    <a href="../dashboard/index.html">📊 Dashboard</a>
    <a href="../templates/index.html">📂 Templates</a>
    <a href="./index.html" class="active">🎤 Voices</a>
    <a href="../editor/index.html">✂️ Editor</a>
    <a href="../profile/index.html">👤 Profile</a>
  </aside>

  <main class="content">
    <header>
      <h2>🎤 Voices Library</h2>
      <input id="searchBox" type="text" placeholder="Search voices..." />
    </header>

    <div id="voicesGrid" class="grid"></div>

    <section class="card mt">
      <h3>🎙 Upload Your Voice (AI Clone)</h3>
      <input type="file" id="voiceUpload" accept="audio/*" />
      <button id="uploadBtn" class="btn primary">Upload & Clone</button>
      <div id="uploadResp" class="small muted mt"></div>
    </section>
  </main>
</body>
</html>
