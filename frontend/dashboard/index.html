<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visora - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Visora</h2>
    <a href="./index.html" class="active">📊 Dashboard</a>
    <a href="../templates/index.html">📂 Templates</a>
    <a href="../voices/index.html">🎤 Voices</a>
    <a href="../editor/index.html">✂️ Editor</a>
    <a href="../profile/index.html">👤 Profile</a>
  </aside>

  <!-- Content -->
  <main class="content">
    <header class="topbar">
      <div class="user-info">
        <img id="profile_pic" src="../assets/user.png" class="avatar"/>
        <div>
          <h3 id="user_name">User Name</h3>
          <p id="user_plan" class="muted">Free Plan</p>
        </div>
      </div>
      <button id="upgradeBtn" class="btn primary">Upgrade Plan</button>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Credits</h3>
        <div id="credits" class="big">—</div>
      </div>
      <div class="card">
        <h3>Recent Jobs</h3>
        <div id="recentJobs">Loading...</div>
      </div>
      <div class="card">
        <h3>Notifications</h3>
        <div id="notifications">No new notifications</div>
      </div>
    </section>

    <section class="card mt">
      <h3>🔥 Trending Templates</h3>
      <div id="trendingList" class="template-grid"></div>
    </section>
  </main>
</body>
</html>
