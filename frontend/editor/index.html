<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visora - Editor</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <aside class="sidebar">
    <h2>Visora</h2>
    <a href="../dashboard/index.html">📊 Dashboard</a>
    <a href="../templates/index.html">📂 Templates</a>
    <a href="../voices/index.html">🎤 Voices</a>
    <a href="./index.html" class="active">✂️ Editor</a>
    <a href="../assistant/index.html">🤖 Assistant</a>
    <a href="../profile/index.html">👤 Profile</a>
  </aside>

  <main class="content">
    <header>
      <h2>✂️ Video Editor</h2>
      <p class="muted small">Trim, merge, add subtitles, music, watermark, filters</p>
    </header>

    <div class="editor-sections">
      <!-- Trim -->
      <div class="card">
        <h3>✂️ Trim Video</h3>
        <input id="trim_video" type="file" accept="video/*" />
        <input id="trim_start" type="number" placeholder="Start (sec)" />
        <input id="trim_end" type="number" placeholder="End (sec)" />
        <button id="trim_btn" class="btn primary">Trim</button>
        <div id="trim_resp" class="mt small muted"></div>
      </div>

      <!-- Merge -->
      <div class="card">
        <h3>➕ Merge Videos</h3>
        <input id="merge_videos" type="file" accept="video/*" multiple />
        <button id="merge_btn" class="btn primary">Merge</button>
        <div id="merge_resp" class="mt small muted"></div>
      </div>

      <!-- Subtitles -->
      <div class="card">
        <h3>💬 Subtitles</h3>
        <input id="subs_video" type="file" accept="video/*" />
        <textarea id="subs_text" placeholder="Enter subtitles here..."></textarea>
        <select id="subs_lang">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="bn">Bengali</option>
        </select>
        <button id="subs_btn" class="btn primary">Add Subtitles</button>
        <div id="subs_resp" class="mt small muted"></div>
      </div>

      <!-- Background Music -->
      <div class="card">
        <h3>🎶 Add / Replace Background Music</h3>
        <input id="bg_video" type="file" accept="video/*" />
        <input id="bg_audio" type="file" accept="audio/*" />
        <button id="bg_btn" class="btn primary">Add Music</button>
        <div id="bg_resp" class="mt small muted"></div>
      </div>

      <!-- Watermark -->
      <div class="card">
        <h3>🔖 Watermark / Logo</h3>
        <input id="wm_video" type="file" accept="video/*" />
        <input id="wm_logo" type="file" accept="image/*" />
        <button id="wm_btn" class="btn primary">Apply Watermark</button>
        <div id="wm_resp" class="mt small muted"></div>
      </div>

      <!-- Filters -->
      <div class="card">
        <h3>🎨 Filters & FX</h3>
        <input id="fx_video" type="file" accept="video/*" />
        <select id="fx_filter">
          <option value="cinematic">Cinematic</option>
          <option value="bw">Black & White</option>
          <option value="vintage">Vintage</option>
          <option value="vivid">Vivid</option>
        </select>
        <button id="fx_btn" class="btn primary">Apply Filter</button>
        <div id="fx_resp" class="mt small muted"></div>
      </div>

      <!-- Aspect Ratio -->
      <div class="card">
        <h3>📱 Aspect Ratio</h3>
        <input id="ar_video" type="file" accept="video/*" />
        <select id="ar_select">
          <option value="9:16">Vertical (Shorts/Reels)</option>
          <option value="16:9">YouTube</option>
          <option value="1:1">Instagram</option>
        </select>
        <button id="ar_btn" class="btn primary">Change Aspect Ratio</button>
        <div id="ar_resp" class="mt small muted"></div>
      </div>
    </div>
  </main>
</body>
</html>
