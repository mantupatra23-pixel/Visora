<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visora - Editor</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <aside class="sidebar">
    <h2>Visora</h2>
    <a href="../dashboard/index.html">📊 Dashboard</a>
    <a href="../templates/index.html">📂 Templates</a>
    <a href="../voices/index.html">🎤 Voices</a>
    <a href="./index.html" class="active">✂️ Editor</a>
    <a href="../profile/index.html">👤 Profile</a>
  </aside>

  <main class="content">
    <header>
      <h2>✂️ Video Editor</h2>
      <p class="muted small">Upload a video and apply edits directly in cloud</p>
    </header>

    <section class="card">
      <h3>Upload Video</h3>
      <input type="file" id="videoFile" accept="video/*" />
      <button id="uploadBtn" class="btn primary">Upload</button>
      <div id="uploadResp" class="mt small muted"></div>
    </section>

    <section class="card mt">
      <h3>Edit Tools</h3>
      <div class="grid-2 gap">
        <div>
          <label>⏳ Trim (start - end sec)</label>
          <input type="number" id="trimStart" placeholder="Start sec">
          <input type="number" id="trimEnd" placeholder="End sec">
          <button class="btn" onclick="trimVideo()">Trim</button>
        </div>

        <div>
          <label>🔗 Merge</label>
          <input type="file" id="mergeFile" accept="video/*" />
          <button class="btn" onclick="mergeVideo()">Merge</button>
        </div>

        <div>
          <label>💬 Subtitles</label>
          <button class="btn" onclick="autoSubtitles()">Auto Generate</button>
          <button class="btn" onclick="uploadSubtitles()">Upload .srt</button>
        </div>

        <div>
          <label>🎵 Background Music</label>
          <input type="file" id="musicFile" accept="audio/*" />
          <button class="btn" onclick="addMusic()">Add Music</button>
        </div>

        <div>
          <label>🎨 Filters</label>
          <select id="filterType">
            <option value="cinematic">Cinematic</option>
            <option value="bw">Black & White</option>
            <option value="warm">Warm</option>
            <option value="cool">Cool</option>
          </select>
          <button class="btn" onclick="applyFilter()">Apply</button>
        </div>

        <div>
          <label>🖼 Watermark</label>
          <input type="file" id="wmFile" accept="image/*" />
          <button class="btn" onclick="addWatermark()">Add Watermark</button>
        </div>
      </div>
      <div id="editorResp" class="mt small muted"></div>
    </section>
  </main>
</body>
</html>
