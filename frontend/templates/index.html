<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visora - Templates</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Visora</h2>
    <a href="../dashboard/index.html">📊 Dashboard</a>
    <a href="../create/index.html">🎬 Create Video</a>
    <a href="./index.html" class="active">📂 Templates</a>
    <a href="../voices/index.html">🎤 Voices</a>
    <a href="../editor/index.html">✂️ Editor</a>
    <a href="../assistant/index.html">🤖 Assistant</a>
    <a href="../profile/index.html">👤 Profile</a>
  </aside>

  <!-- Main -->
  <main class="content">
    <header>
      <h2>📂 Templates</h2>
      <p class="muted">Browse 500+ templates by category, preview and apply</p>
    </header>

    <!-- Search + Filter -->
    <section class="card">
      <input id="search" placeholder="🔍 Search templates..." />
      <select id="filter">
        <option value="all">All</option>
        <option value="cinematic">🎥 Cinematic</option>
        <option value="promo">🚀 Promo / Ads</option>
        <option value="education">🎓 Education</option>
        <option value="meme">😂 Meme</option>
        <option value="festival">🎉 Festival</option>
        <option value="travel">✈️ Travel</option>
        <option value="fitness">🏋 Fitness</option>
      </select>
    </section>

    <!-- Grid -->
    <section class="card">
      <div id="templateGrid" class="grid"></div>
    </section>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal hidden">
      <div class="modal-content">
        <span id="closeModal" class="close">&times;</span>
        <h3 id="modalTitle"></h3>
        <video id="modalVideo" controls></video>
        <button id="useTemplate" class="btn primary mt">✅ Use This Template</button>
      </div>
    </div>
  </main>
</body>
</html>
