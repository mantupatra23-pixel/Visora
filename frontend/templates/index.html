<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visora - Templates</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <aside class="sidebar">
    <h2>Visora</h2>
    <a href="../dashboard/index.html">🏠 Dashboard</a>
    <a href="index.html" class="active">🎬 Templates</a>
    <a href="../voices/index.html">🎤 Voices</a>
    <a href="../editor/index.html">✂️ Editor</a>
    <a href="../profile/index.html">👤 Profile</a>
  </aside>

  <main class="content">
    <header class="topbar">
      <h1>🎬 Templates</h1>
      <input id="searchBox" type="text" placeholder="Search templates..." />
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="ads">Ads</option>
        <option value="education">Education</option>
        <option value="gaming">Gaming</option>
        <option value="meme">Meme</option>
        <option value="festival">Festival</option>
      </select>
    </header>

    <section id="templateGrid" class="template-grid"></section>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="closeModal">&times;</span>
      <img id="modalImg" src="" alt="Template Preview">
      <h2 id="modalTitle"></h2>
      <p id="modalCategory"></p>
      <button id="useTemplateBtn" class="btn primary">Use Template</button>
    </div>
  </div>
</body>
</html>
