<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Visora — Create AI Videos</title>
<style>
  body{font-family:Inter,Arial,sans-serif;background:#14151B;color:#fff;margin:0;padding:0}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#18191F}
  .container{padding:16px}
  .card{background:#1f2026;border-radius:10px;padding:12px;margin-bottom:12px}
  input,textarea,select{width:100%;padding:8px;border-radius:6px;border:1px solid #2a2b31;background:#0f1113;color:#fff}
  button{background:#ffe08c;color:#000;padding:8px 12px;border-radius:8px;border:0;cursor:pointer}
  .muted{color:#999;font-size:13px}
  .row{display:flex;gap:8px}
</style>
</head>
<body>
  <div class="bar">
    <div style="font-weight:700">Visora</div>
    <div><button id="healthBtn">Health</button></div>
  </div>

  <div class="container">
    <div class="card">
      <h3>Create Video (Script → Video)</h3>
      <label>Title</label>
      <input id="title" placeholder="Video title" />
      <label style="margin-top:6px">Script</label>
      <textarea id="script" rows="5" placeholder="Write script or ask assistant"></textarea>
      <div style="margin-top:8px;">
        <button id="assistBtn">Ask Assistant</button>
        <select id="tone" style="width:160px;margin-left:8px;">
          <option value="helpful">Helpful</option><option value="friendly">Friendly</option><option value="funny">Funny</option>
        </select>
      </div>
      <div style="margin-top:8px" class="row">
        <select id="template"><option>Motivation</option><option>Promo</option><option>Explainer</option><option>Cinematic</option></select>
        <select id="quality"><option>HD</option><option>FULLHD</option><option>4K</option></select>
        <select id="lang"><option value="hi">Hindi</option><option value="en">English</option></select>
      </div>

      <div style="margin-top:10px">
        <label>Upload Characters (images)</label>
        <input id="chars" type="file" multiple accept="image/*" />
        <label style="margin-top:6px">Upload Voices (optional)</label>
        <input id="voices" type="file" multiple accept="audio/*" />
        <label style="margin-top:6px">Background Music (optional)</label>
        <input id="bg" type="file" accept="audio/*" />
      </div>

      <div style="margin-top:12px">
        <button id="renderBtn">Generate (enqueue)</button>
        <div id="status" class="muted" style="margin-top:8px"></div>
      </div>
    </div>

    <div class="card">
      <h4>Jobs / Gallery</h4>
      <div id="jobsList" class="muted">No jobs yet.</div>
    </div>

    <div class="card">
      <h4>Quick</h4>
      <button id="listTemplates">List Templates</button>
      <button id="listChars">My Characters</button>
    </div>

    <div id="assistantResult" class="card" style="display:none"></div>
  </div>

<script>
const BASE = (typeof BASE_URL !== "undefined") ? BASE_URL : "https://your-backend.example.com";
const healthBtn = document.getElementById('healthBtn');
const assistBtn = document.getElementById('assistBtn');
const renderBtn = document.getElementById('renderBtn');
const statusDiv = document.getElementById('status');
const jobsList = document.getElementById('jobsList');
const assistantResult = document.getElementById('assistantResult');

healthBtn.onclick = async ()=> {
  try {
    const r = await fetch(BASE + '/health');
    const j = await r.json();
    alert(JSON.stringify(j,null,2));
  } catch(e){ alert('health check failed: '+e) }
}

assistBtn.onclick = async ()=>{
  const q = document.getElementById('script').value || "Make a short promo";
  const tone = document.getElementById('tone').value;
  statusDiv.innerText = "Assistant thinking..."
  try {
    const res = await fetch(BASE + '/assistant', {method:'POST',headers:{'Content-Type':'application/json'},body: JSON.stringify({query:q,tone:tone,lang:document.getElementById('lang').value})});
    const j = await res.json();
    assistantResult.style.display = 'block';
    assistantResult.innerHTML = '<b>Assistant:</b><div style="margin-top:6px">'+(j.reply||'')+'</div>' + (j.audio_url?('<div style="margin-top:6px"><a href="'+j.audio_url+'" target="_blank">Play audio</a></div>'):'');
    statusDiv.innerText = "";
  } catch(e){ statusDiv.innerText = "Assistant error: "+e }
}

renderBtn.onclick = async ()=>{
  renderBtn.disabled = true;
  statusDiv.innerText = "Uploading & queueing job..."
  try {
    const fd = new FormData();
    fd.append('user_email','demo@visora.com');
    fd.append('title', document.getElementById('title').value || 'Untitled');
    fd.append('script', document.getElementById('script').value || '');
    fd.append('template', document.getElementById('template').value);
    fd.append('quality', document.getElementById('quality').value);
    fd.append('lang', document.getElementById('lang').value);
    // files
    const charInput = document.getElementById('chars');
    for (let i=0;i<charInput.files.length;i++) fd.append('characters', charInput.files[i]);
    const voices = document.getElementById('voices');
    for (let i=0;i<voices.files.length;i++) fd.append('character_voice_files', voices.files[i]);
    const bg = document.getElementById('bg');
    if (bg.files.length) fd.append('bg_music_file', bg.files[0]);
    const resp = await fetch(BASE + '/generate_video', {method:'POST', body: fd});
    const j = await resp.json();
    if (resp.ok) {
      statusDiv.innerText = 'Job queued. ID: ' + (j.job_id || j.video_id);
      pollJob(j.job_id);
    } else {
      statusDiv.innerText = 'Error: ' + JSON.stringify(j);
    }
  } catch(e){
    statusDiv.innerText = 'Upload error: '+e;
  } finally {
    renderBtn.disabled = false;
  }
}

async function pollJob(job_id) {
  if (!job_id) return;
  statusDiv.innerText = 'Polling job: ' + job_id;
  const interval = setInterval(async ()=>{
    try {
      const r = await fetch(BASE + '/job_status?job_id=' + encodeURIComponent(job_id));
      if (!r.ok) {
        const t = await r.text();
        statusDiv.innerText = 'Job status error: '+t;
        clearInterval(interval);
        return;
      }
      const j = await r.json();
      statusDiv.innerText = 'Job ' + job_id + ' -> ' + j.status;
      if (j.status === 'done') {
        clearInterval(interval);
        statusDiv.innerHTML = 'Done. Download: <a target="_blank" href="'+BASE+'/outputs/'+(j.output_file || '')+'">'+(j.output_file || 'download')+'</a>';
        refreshJobsList();
      } else if (j.status === 'failed') {
        clearInterval(interval);
        statusDiv.innerText = 'Job failed: ' + (j.error||'unknown');
      }
    } catch(e){
      statusDiv.innerText = 'Poll error: '+e;
      clearInterval(interval);
    }
  }, 4000);
}

async function refreshJobsList(){
  try {
    const r = await fetch(BASE + '/gallery?user_email=demo@visora.com');
    const j = await r.json();
    if (Array.isArray(j) && j.length){
      jobsList.innerHTML = '';
      j.forEach(v=>{
        const el = document.createElement('div');
        el.innerHTML = '<b>'+ (v.title||'Untitled') + '</b> — ' + (v.status||'') + ' — ' + (v.file ? ('<a target=_blank href="'+BASE+'/'+ v.file.replace(/^outputs\\//,'outputs/')+'">Download</a>') : '');
        jobsList.appendChild(el);
      })
    } else {
      jobsList.innerText = 'No videos yet.';
    }
  } catch(e){
    jobsList.innerText = 'Gallery error: '+e;
  }
}

document.getElementById('listTemplates').onclick = async ()=>{
  try {
    const r = await fetch(BASE + '/templates');
    const j = await r.json();
    alert(JSON.stringify(j,null,2));
  } catch(e){ alert('err '+e) }
}
document.getElementById('listChars').onclick = async ()=>{
  try {
    const r = await fetch(BASE + '/characters?user_email=demo@visora.com');
    const j = await r.json();
    alert(JSON.stringify(j,null,2));
  } catch(e){ alert('err '+e) }
}

</script>
</body>
</html>
