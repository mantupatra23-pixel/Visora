<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visora – All in One</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#111; color:#eee; }
    .navbar { background:#222; }
    .card { background:#1c1c1c; border:none; border-radius:12px; }
    .btn-main { background:#f9a825; color:black; font-weight:bold; }
    .btn-main:hover { background:#ffca28; }
    .section-title { margin:25px 0 15px; font-size:1.3rem; font-weight:bold; }
    video { width:100%; border-radius:10px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-3">
  <a class="navbar-brand" href="#">Visora</a>
  <span id="user-credits">Credits: --</span>
</nav>

<div class="container my-3">

  <!-- Profile -->
  <div class="card p-3 mb-3">
    <h4>👤 Profile</h4>
    <div id="profileBox">Loading...</div>
  </div>

  <!-- Create Character -->
  <div class="card p-3 mb-3">
    <h4>🧑‍🎤 Create Character</h4>
    <form id="charForm">
      <input class="form-control mb-2" name="name" placeholder="Character name" required>
      <input type="file" name="photo" class="form-control mb-2" accept="image/*">
      <input type="file" name="voice" class="form-control mb-2" accept="audio/*">
      <button class="btn btn-main w-100">Save Character</button>
    </form>
    <div id="charList" class="mt-2"></div>
  </div>

  <!-- Voices -->
  <div class="card p-3 mb-3">
    <h4>🎙 Voices</h4>
    <form id="voiceForm">
      <input type="file" name="file" class="form-control mb-2" accept="audio/*">
      <button class="btn btn-main w-100">Upload Voice</button>
    </form>
    <div id="voiceList" class="mt-2"></div>
  </div>

  <!-- Create Video -->
  <div class="card p-3 mb-3">
    <h4>🎬 Create Video</h4>
    <form id="videoForm">
      <input class="form-control mb-2" name="title" placeholder="Video Title">
      <textarea class="form-control mb-2" name="script" placeholder="Script"></textarea>
      <select class="form-select mb-2" name="template" id="templateSelect"></select>
      <select class="form-select mb-2" name="quality">
        <option>HD</option><option>FullHD</option><option>4K</option>
      </select>
      <select class="form-select mb-2" name="length_type">
        <option value="short">Short</option><option value="long">Long</option>
      </select>
      <input type="file" class="form-control mb-2" name="images" multiple>
      <input type="file" class="form-control mb-2" name="voices" multiple>
      <input type="file" class="form-control mb-2" name="bg_music">
      <button class="btn btn-main w-100">Render</button>
    </form>
    <div id="renderStatus" class="mt-2 text-warning"></div>
  </div>

  <!-- Gallery -->
  <h4 class="section-title">📂 Gallery</h4>
  <div id="galleryRow" class="row"></div>

  <!-- Templates -->
  <h4 class="section-title">🔥 Trending Templates</h4>
  <div id="trendingRow" class="row"></div>

  <!-- Assistant -->
  <div class="card p-3 mb-3">
    <h4>🤖 Assistant</h4>
    <textarea id="assistantQuery" class="form-control mb-2" placeholder="Ask for help..."></textarea>
    <select id="toneSelect" class="form-select mb-2">
      <option value="helpful">Helpful</option>
      <option value="friendly">Friendly</option>
      <option value="funny">Funny</option>
    </select>
    <button class="btn btn-main w-100" onclick="askAssistant()">Ask</button>
    <div id="assistantReply" class="mt-2"></div>
  </div>

  <!-- Payments -->
  <div class="card p-3 mb-3">
    <h4>💳 Upgrade Plan</h4>
    <button class="btn btn-main w-100" onclick="alert('Use Razorpay/PayPal integration on backend!')">Upgrade</button>
  </div>

</div>

<script>
const BASE_URL = "https://visora-backend.onrender.com"; // <-- अपना backend URL डालना

// Load profile
fetch(BASE_URL+"/profile/demo@visora.com").then(r=>r.json()).then(u=>{
  document.getElementById("profileBox").innerHTML =
    `Email: ${u.email}<br>Name: ${u.name}<br>Plan: ${u.plan}<br>Credits: ${u.credits}`;
  document.getElementById("user-credits").innerText = "Credits: "+u.credits;
});

// Characters
function loadCharacters(){
  fetch(BASE_URL+"/characters?user_email=demo@visora.com").then(r=>r.json()).then(cs=>{
    document.getElementById("charList").innerHTML = cs.map(c=>`<div>${c.name} (${c.ai_style})</div>`).join("");
  });
}
document.getElementById("charForm").onsubmit = async e=>{
  e.preventDefault(); let fd=new FormData(e.target);
  await fetch(BASE_URL+"/character",{method:"POST",body:fd});
  loadCharacters();
};
loadCharacters();

// Voices
function loadVoices(){
  fetch(BASE_URL+"/voices?user_email=demo@visora.com").then(r=>r.json()).then(vs=>{
    document.getElementById("voiceList").innerHTML = vs.map(v=>`<div>${v.name}</div>`).join("");
  });
}
document.getElementById("voiceForm").onsubmit = async e=>{
  e.preventDefault(); let fd=new FormData(e.target);
  await fetch(BASE_URL+"/voice",{method:"POST",body:fd}); loadVoices();
};
loadVoices();

// Templates
fetch(BASE_URL+"/templates/trending").then(r=>r.json()).then(ts=>{
  let row=document.getElementById("trendingRow");
  row.innerHTML=ts.map(t=>`<div class="col-6 col-md-3 mb-2"><div class="card p-2 text-center">${t.name}</div></div>`).join("");
  document.getElementById("templateSelect").innerHTML=ts.map(t=>`<option>${t.name}</option>`).join("");
});

// Gallery
function loadGallery(){
  fetch(BASE_URL+"/gallery?user_email=demo@visora.com").then(r=>r.json()).then(vs=>{
    let row=document.getElementById("galleryRow");
    row.innerHTML=vs.map(v=>`
      <div class="col-6 col-md-4 mb-2">
        <div class="card p-2">
          <video src="${BASE_URL}/outputs/${v.file}" controls></video>
          <small>${v.title} - ${v.status}</small>
        </div>
      </div>`).join("");
  });
}
loadGallery();

// Video render
document.getElementById("videoForm").onsubmit=async e=>{
  e.preventDefault(); let fd=new FormData(e.target);
  document.getElementById("renderStatus").innerText="Submitting...";
  let r=await fetch(BASE_URL+"/generate_video",{method:"POST",body:fd});
  let d=await r.json(); document.getElementById("renderStatus").innerText=JSON.stringify(d);
  setTimeout(loadGallery,3000);
};

// Assistant
async function askAssistant(){
  let q=document.getElementById("assistantQuery").value;
  let tone=document.getElementById("toneSelect").value;
  let r=await fetch(BASE_URL+"/assistant",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:q,tone})});
  let d=await r.json(); document.getElementById("assistantReply").innerText=d.reply;
}
</script>

</body>
</html>
