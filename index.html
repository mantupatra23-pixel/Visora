<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Visora • AI Video Studio</title>
  <link rel="stylesheet" href="style.css"/>
  <script defer src="script.js"></script>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h1 class="brand">Visora</h1>
    <nav class="nav">
      <button data-page="dashboard" class="active">🏠 Dashboard</button>
      <button data-page="create">🎬 Create Video</button>
      <button data-page="templates">📂 Templates</button>
      <button data-page="voices">🎙 Voices</button>
      <button data-page="editor">✂️ Editor</button>
      <button data-page="assistant">🤖 Assistant</button>
      <button data-page="gallery">🖼 Gallery</button>
      <button data-page="profile">👤 Profile</button>
      <button data-page="payments">💳 Payments</button>
      <button data-page="admin">🛡 Admin Panel</button>
    </nav>
    <div id="baseUrlShow" class="muted small"></div>
  </aside>

  <!-- Content -->
  <main class="content">
    <header>
      <h2 id="pageTitle">Dashboard</h2>
      <button id="refreshBtn" class="btn primary">Refresh</button>
    </header>

    <!-- Dashboard -->
    <section id="dashboard" class="page">
      <div class="grid cols3">
        <div class="card"><div class="muted small">Plan</div><div id="planName" class="big">—</div></div>
        <div class="card"><div class="muted small">Credits</div><div id="credits" class="big">—</div></div>
        <div class="card"><div class="muted small">Notifications</div><div id="notifyBox">—</div></div>
      </div>
      <div class="card mt"><h3>Trending Templates</h3><div id="trendingList">Loading…</div></div>
      <div class="card mt"><h3>Recent Jobs</h3><div id="recentJobs">Loading…</div></div>
    </section>

    <!-- Create Video -->
    <section id="create" class="page hidden">
      <div class="card">
        <h3>Quick Create Video</h3>
        <input id="cv_title" placeholder="Title"/>
        <textarea id="cv_script" placeholder="Script"></textarea>
        <select id="cv_template"></select>
        <select id="cv_voice"></select>
        <select id="cv_quality"><option>HD</option><option>4K</option></select>
        <button id="btn_generate" class="btn primary mt">Generate</button>
        <div id="create_resp" class="mt small muted"></div>
      </div>
    </section>

    <!-- Templates -->
    <section id="templates" class="page hidden">
      <div class="card">
        <h3>500+ Templates</h3>
        <input id="tpl_search" placeholder="Search template…"/>
        <div id="tpl_list">Loading…</div>
      </div>
    </section>

    <!-- Voices -->
    <section id="voices" class="page hidden">
      <div class="card">
        <h3>1000+ Voices</h3>
        <input id="voice_search" placeholder="Search voice…"/>
        <div id="voice_list">Loading…</div>
      </div>
    </section>

    <!-- Editor -->
    <section id="editor" class="page hidden">
      <div class="card"><h3>Video Editor</h3>
        <button class="btn">Trim</button>
        <button class="btn">Merge</button>
        <button class="btn">Add Subtitles</button>
        <button class="btn">Translate Subs</button>
        <button class="btn">Watermark</button>
        <button class="btn">Filters</button>
      </div>
    </section>

    <!-- Assistant -->
    <section id="assistant" class="page hidden">
      <div class="card"><h3>Assistant (ChatGPT)</h3>
        <input id="as_q" placeholder="Ask script idea…"/>
        <button id="as_call" class="btn primary">Ask</button>
        <div id="as_reply" class="mt small muted"></div>
      </div>
    </section>

    <!-- Gallery -->
    <section id="gallery" class="page hidden">
      <div class="card"><h3>Gallery</h3><div id="galleryList">Loading…</div></div>
    </section>

    <!-- Profile -->
    <section id="profile" class="page hidden">
      <div class="card"><h3>Profile</h3><pre id="profileBox">Loading…</pre></div>
    </section>

    <!-- Payments -->
    <section id="payments" class="page hidden">
      <div class="card"><h3>Payments</h3>
        <button class="btn">Razorpay</button>
        <button class="btn">PayPal</button>
      </div>
    </section>

    <!-- Admin -->
    <section id="admin" class="page hidden">
      <div class="card"><h3>Admin Panel</h3>
        <button class="btn">Manage Users</button>
        <button class="btn">Manage Templates</button>
        <button class="btn">Analytics</button>
      </div>
    </section>

  </main>
</div>
</body>
</html>
