<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visora</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#14151B; color:#fff; }
    header { background:#1f2026; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
    header h1 { color: #f5c842; margin:0; }
    nav { display:flex; justify-content:space-around; position:fixed; bottom:0; left:0; right:0; background:#1f2026; padding:10px 0; }
    nav button { background:none; border:none; color:#aaa; font-size:14px; }
    nav button.active { color:#f5c842; font-weight:bold; }
    main { padding:20px; margin-bottom:60px; }
    .card { background:#1e1f25; padding:15px; border-radius:8px; margin-bottom:12px; }
    .btn { background:#f5c842; color:#000; border:none; padding:8px 16px; border-radius:5px; cursor:pointer; }
    .btn:disabled { opacity:0.6; }
  </style>
</head>
<body>
  <header>
    <h1>Visora</h1>
    <button onclick="alert('Help Coming Soon')">❓</button>
  </header>

  <main id="content">
    <div class="card">
      <h2>Credits: <span id="credits">--</span></h2>
      <button class="btn" onclick="alert('Upgrade Coming Soon')">Upgrade</button>
    </div>

    <div class="card">
      <h3>Quick Actions</h3>
      <button class="btn" onclick="showCreate()">Create Video</button>
      <button class="btn" onclick="fetchGallery()">View Gallery</button>
    </div>

    <div class="card">
      <h3>Recent Videos</h3>
      <ul id="videoList"></ul>
    </div>
  </main>

  <nav>
    <button onclick="showHome()" id="homeBtn" class="active">Home</button>
    <button onclick="showCreate()" id="createBtn">Create</button>
    <button onclick="fetchGallery()" id="galleryBtn">Gallery</button>
    <button onclick="alert('Assets Coming Soon')">Assets</button>
    <button onclick="alert('Profile Coming Soon')">Profile</button>
  </nav>

<script>
  const API_BASE = "https://aivideoapp-kzp6.onrender.com"; // 🔗 Backend URL

  async function fetchCredits() {
    document.getElementById("credits").innerText = "Loading...";
    try {
      // Example API (replace with your actual credits API if exists)
      let res = await fetch(`${API_BASE}/credits?user_email=demo@visora.com`);
      let data = await res.json();
      document.getElementById("credits").innerText = data.credits || "0";
    } catch (e) {
      document.getElementById("credits").innerText = "Error";
    }
  }

  async function fetchGallery() {
    document.getElementById("content").innerHTML = "<h2>Loading Gallery...</h2>";
    try {
      let res = await fetch(`${API_BASE}/gallery?user_email=demo@visora.com`);
      let data = await res.json();
      let html = "<h2>Gallery</h2>";
      if (data.length === 0) html += "<p>No videos found</p>";
      else {
        html += "<ul>";
        data.forEach(v => {
          html += `<li>${v.title || "Untitled"} - ${v.status || ""} 
                   <button class="btn" onclick="editVideo(${v.id})">Edit</button></li>`;
        });
        html += "</ul>";
      }
      document.getElementById("content").innerHTML = html;
    } catch (e) {
      document.getElementById("content").innerHTML = "<p>Error loading gallery</p>";
    }
  }

  function showCreate() {
    document.getElementById("content").innerHTML = `
      <h2>Create Video</h2>
      <input id="title" placeholder="Title" style="width:100%;padding:8px;margin-bottom:8px;" />
      <textarea id="script" placeholder="Script" rows="4" style="width:100%;padding:8px;margin-bottom:8px;"></textarea>
      <button class="btn" onclick="submitRender()">Render</button>
    `;
  }

  async function submitRender() {
    let title = document.getElementById("title").value;
    let script = document.getElementById("script").value;
    alert("Submitting render...");

    let fd = new FormData();
    fd.append("user_email","demo@visora.com");
    fd.append("title", title);
    fd.append("script", script);
    fd.append("template","Motivation");
    fd.append("quality","HD");
    fd.append("lang","hi");
    fd.append("length_type","short");

    try {
      let res = await fetch(`${API_BASE}/generate_video`, {method:"POST", body:fd});
      let data = await res.json();
      alert("Render Started. Download: "+data.download_url);
    } catch (e) {
      alert("Error: "+e);
    }
  }

  function showHome() {
    document.getElementById("content").innerHTML = `
      <div class="card">
        <h2>Credits: <span id="credits">--</span></h2>
        <button class="btn" onclick="alert('Upgrade Coming Soon')">Upgrade</button>
      </div>
      <div class="card">
        <h3>Quick Actions</h3>
        <button class="btn" onclick="showCreate()">Create Video</button>
        <button class="btn" onclick="fetchGallery()">View Gallery</button>
      </div>
      <div class="card">
        <h3>Recent Videos</h3>
        <ul id="videoList"></ul>
      </div>
    `;
    fetchCredits();
  }

  function editVideo(id) {
    alert("Edit Page Coming for Video ID: "+id);
  }

  // load home on startup
  fetchCredits();
</script>
</body>
</html>
