<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visora Frontend</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    input, textarea, select, button {
      margin: 8px;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }
    input, textarea, select {
      width: 90%;
    }
    button {
      background: #f5a623;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 8px;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      background: #222;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>🎬 Visora Video Generator</h1>
  <div class="container">
    <form id="videoForm">
      <input type="text" id="title" placeholder="Video Title" required><br>
      <textarea id="script" placeholder="Enter script..." rows="4" required></textarea><br>
      
      <label>Template:</label>
      <select id="template">
        <option value="Motivation">Motivation</option>
        <option value="Promo">Promo</option>
        <option value="Explainer">Explainer</option>
        <option value="Cinematic">Cinematic</option>
      </select><br>

      <label>Quality:</label>
      <select id="quality">
        <option value="HD">HD</option>
        <option value="FULLHD">FULL HD</option>
        <option value="4K">4K</option>
      </select><br>

      <label>Language:</label>
      <select id="lang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="bn">Bengali</option>
        <option value="ta">Tamil</option>
      </select><br>

      <label>Length:</label>
      <select id="length_type">
        <option value="short">Short</option>
        <option value="long">Long</option>
      </select><br>

      <button type="submit">🎥 Generate Video</button>
    </form>

    <div id="output" class="result"></div>
  </div>

  <script>
    const BASE_URL = "https://aivideoapp-kzp6.onrender.com";

    document.getElementById("videoForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      document.getElementById("output").innerHTML = "⏳ Generating video... Please wait.";

      let data = {
        user_email: "demo@visora.com",
        title: document.getElementById("title").value,
        script: document.getElementById("script").value,
        template: document.getElementById("template").value,
        quality: document.getElementById("quality").value,
        lang: document.getElementById("lang").value,
        length_type: document.getElementById("length_type").value
      };

      try {
        let res = await fetch(BASE_URL + "/generate_video", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        let result = await res.json();
        if (res.ok) {
          document.getElementById("output").innerHTML = `
            ✅ Video Rendered Successfully! <br>
            <a href="${result.download_url}" target="_blank">Download Video</a>
          `;
        } else {
          document.getElementById("output").innerHTML = "❌ Error: " + (result.error || res.status);
        }
      } catch (err) {
        document.getElementById("output").innerHTML = "⚠️ Failed: " + err.message;
      }
    });
  </script>
</body>
</html>
